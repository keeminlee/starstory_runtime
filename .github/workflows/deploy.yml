name: Deploy Meepo

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: meepo-production
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run CI gate
        run: npm run ci:verify

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Start ssh-agent
        run: |
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' | ssh-add -
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

      - name: Trust host
        run: |
          ssh-keyscan -p "${{ secrets.EC2_PORT }}" -H "${{ secrets.EC2_SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Run remote deploy
        run: |
          APP_DIR="/home/meepo/meepo-bot"
          ssh -p "${{ secrets.EC2_PORT }}" \
            "${{ secrets.EC2_SSH_USER }}@${{ secrets.EC2_SSH_HOST }}" \
            "sudo APP_DIR=$APP_DIR /bin/bash $APP_DIR/deploy/ec2/deploy-meepo.sh"

      - name: Deploy Discord commands
        run: |
          APP_DIR="/home/meepo/meepo-bot"
          ssh -p "${{ secrets.EC2_PORT }}" \
            "${{ secrets.EC2_SSH_USER }}@${{ secrets.EC2_SSH_HOST }}" \
            "sudo bash -lc 'set -a; . /etc/meepo/meepo-bot.env; if [ -f /etc/meepo/meepo-web.env ]; then . /etc/meepo/meepo-web.env; fi; set +a; cd $APP_DIR && npm run deploy:commands'"