name: Deploy Meepo

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: meepo-production
  cancel-in-progress: true

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Run CI gate
        run: npm run ci:verify

  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Start ssh-agent
        run: |
          eval "$(ssh-agent -s)"
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' | ssh-add -
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

      - name: Trust host
        run: |
          ssh-keyscan -p "${{ secrets.EC2_PORT }}" -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Run remote deploy
        run: |
          ssh -p "${{ secrets.EC2_PORT }}" \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            "sudo /usr/local/bin/deploy-meepo"