id: meepo_awaken
version: 2
start_scene: cold_open

scenes:

  # -----------------------------
  # 0) Cold Open — Gravity Moment
  # -----------------------------
  cold_open:
    say:
      - text: "*The air in this place tightens—like the world is holding its breath.*"
        delay_ms: 3200
        kind: flavor

      - text: "*Somewhere beyond the veil of the ordinary… something vast turns its attention toward you.*"
        delay_ms: 3200
        kind: flavor

      - text: "*For a moment… nothing happens.*"
        delay_ms: 2800
        kind: flavor

      - text: "…meep."
        kind: voice

      - text: "*A tiny star flickers into existence above the channel.*"
        delay_ms: 900
        kind: flavor

      - text: "**I heard the summons.**"
        kind: voice

      - text: "*The star drifts closer, unfolding into a small celestial creature—soft wings, faint starlight, eyes still dull with sleep.*"
        kind: flavor

      - text: "\"Who has called me down from the stars… to witness an adventure for the ages, meep?\""
        kind: voice
    next: dm_role

  # -----------------------------
  # 1) DM Role — Anchor of Authority
  # -----------------------------
  dm_role:
    requires: [prompt.role_select]
    say:
      - text: "*Meepo hovers in place, as if waiting for a name to bind the ritual.*"
        kind: flavor
      - text: "\"Before we begin… I need one anchor.\""
        kind: voice
      - text: "**Select the Dungeon Master role for this campaign.**"
        kind: system
    prompt:
      type: role_select
      key: dm_role_id
      label: "Select the DM role"
    next: dm_name

  # -----------------------------
  # 2) DM Name — Recognition + Sticky Memory
  # -----------------------------
  dm_name:
    requires: [prompt.modal_text]
    say:
      - text: "*As you answer, Meepo’s eyes brighten—soft light blooming behind them like dawn.*"
        kind: flavor
      - text: "\"Ah! I can see you now, meep.\""
        kind: voice
      - text: "\"What should I call you, storyteller?\""
        kind: voice
      - text: "**Enter the name Meepo should use for you.**"
        kind: system
    prompt:
      type: modal_text
      key: dm_display_name
      label: "Your name (what Meepo calls you)"
    commit:
      - type: write_memory
        memory_key: dm_display_name
        scope: guild
        sticky: true
        from: dm_display_name
    next: home_channel

  # -----------------------------
  # 3) Home Channel — “A Quiet Place to Dwell”
  # -----------------------------
  home_channel:
    requires: [prompt.channel_select, template.vars]
    say:
      - text: "*Meepo spins slowly in the air, taking in the shape of your world.*"
        kind: flavor
      - text: "\"Between adventures, I’ll need a quiet place to perch.\""
        kind: voice
      - text: "\"Where should I call home?\""
        kind: voice
      - text: "**Select Meepo’s home text channel.**"
        kind: system
    prompt:
      type: channel_select
      key: home_channel_id
      filter: text
      default: current_channel

    # If the DM picks a different channel, we do a diegetic “travel” moment.
    on_change:
      if_different_channel:
        departure:
          channel: current_channel
          say:
            - text: "*Meepo glances toward {{home_channel}}.*"
              kind: flavor
            - text: "\"Ah… I think I see a cozy place to settle, meep.\""
              kind: voice
            - text: "*With a flutter of starlight, Meepo drifts away—beckoning you to follow.*"
              kind: flavor

        arrival:
          channel: "{{home_channel_id}}"
          say:
            - text: "*Stardust gathers in the air…*"
              delay_ms: 900
              kind: flavor
            - text: "*Meepo appears gently, landing atop an invisible perch.*"
              kind: flavor
            - text: "\"This will do nicely.\""
              kind: voice

    next: player_registry

  # -----------------------------
  # 4) Player Registry — “Who are the heroes?”
  # -----------------------------
  player_registry:
    requires: [prompt.registry_builder]
    say:
      - text: "*Meepo’s gaze turns outward, as if sensing other souls nearby.*"
        kind: flavor
      - text: "\"But a story cannot exist with only a chronicler…\""
        kind: voice
      - text: "\"Who are the heroes I will travel with?\""
        kind: voice
      - text: "**Add each player and their character name.**"
        kind: system
      - text: "*\"(This helps me recognize voices, meep.)\"*"
        kind: flavor
    prompt:
      type: registry_builder
      key: players
      entry_schema:
        - { type: user_select, key: user_id, label: "Player" }
        - { type: text, key: character_name, label: "Character name" }
    commit:
      - type: append_registry_yaml
        target: pcs
        entries_from: players
        mode: append_only
    next: voice_channel

  # -----------------------------
  # 5) Voice Channel — “Where do you gather?”
  # -----------------------------
  voice_channel:
    requires: [prompt.channel_select]
    say:
      - text: "*Meepo tilts her head, listening to distant echoes that aren’t quite sound.*"
        kind: flavor
      - text: "\"And where do you gather to tell these stories?\""
        kind: voice
      - text: "\"I should listen from there.\""
        kind: voice
      - text: "**Select the voice channel used for sessions.**"
        kind: system
    prompt:
      type: channel_select
      key: voice_channel_id
      filter: voice
    next: voice_greeting

  # -----------------------------
  # 6) Voice Greeting — “Meepo’s first words”
  # -----------------------------
  voice_greeting:
    requires: [action.join_voice_and_speak]
    say:
      - text: "*Meepo’s wings flutter once, as if bracing herself.*"
        kind: flavor
      - text: "\"Alright… I’m going to try something, meep.\""
        kind: voice
      - text: "*She drifts toward the place where voices gather…*"
        kind: flavor
    action:
      type: join_voice_and_speak
      channel_key: voice_channel_id
      lines:
        - "Hello… can you hear me?"
        - "I am Meepo."
        - "I will listen carefully—and remember everything that happens here."
        - "When your adventure begins, your storyteller will say: slash meepo showtime start."
    next: talk_pref

  # -----------------------------
  # 7) Talk Preference — Quiet Chronicler vs Party Companion
  # -----------------------------
  talk_pref:
    requires: [prompt.choice, template.vars]
    say:
      - text: "*Meepo returns with a faint shimmer of pride, as if relieved it worked.*"
        kind: flavor
      - text: "\"Some storytellers prefer a quiet chronicler.\""
        kind: voice
      - text: "\"Others enjoy hearing me speak.\""
        kind: voice
      - text: "\"How should I behave during your adventures, {{dm_display_name}}?\""
        kind: voice
      - text: "**Choose Meepo’s default speaking mode.**"
        kind: system
    prompt:
      type: choice
      key: default_talk_mode
      options:
        - { value: hush, label: "Quiet Chronicler (recommended)" }
        - { value: talk, label: "Party Companion" }
    next: complete

  # -----------------------------
  # 8) Completion — Ready for Adventure
  # -----------------------------
  complete:
    say:
      - text: "*Everything is ready.*"
        kind: flavor
      - text: "\"I’ll watch quietly from here until you call on me, meep.\""
        kind: voice
      - text: "**When your adventure begins, say:**"
        kind: system
      - text: "`/meepo showtime start label:<session>`"
        kind: system
      - text: "*\"And I will begin recording the tale.\"*"
        kind: flavor
    commit:
      - type: set_flag
        key: awakened
        value: true
    end: true
