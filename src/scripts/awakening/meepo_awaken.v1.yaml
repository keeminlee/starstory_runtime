id: meepo_awaken
version: 1
start_scene: cold_open
scenes:
  cold_open:
    say:
      - text: "*The air in this place tightens—like the world is holding its breath.*"
        delay_ms: 13500
        kind: flavor
      - text: "*Something vast turns its attention toward this place.*"
        delay_ms: 13500
        kind: flavor
      - text: "*For a moment… nothing happens.*"
        delay_ms: 50000
        kind: flavor
      - text: "…meep."
        kind: voice
      - text: "**I heard the summons.**"
        kind: voice
    next: dm_role

  dm_role:
    say: "Before we begin, I need one anchor."
    next: ask_dm_name

  ask_dm_name:
    say: "What should I call you, Dungeon Master?"
    prompt:
      type: text_input
      key: dm_display_name
      kind: modal_text
    commit:
      - type: write_memory
        memory_key: dm_display_name
        scope: guild
        sticky: true
        from: dm_display_name
    next: done_stub

  done_stub:
    say: "(stub)"
    commit:
      - type: set_flag
        key: awakened
        value: true
